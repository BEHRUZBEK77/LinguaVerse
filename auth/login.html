<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirish — LinguaVerse</title>


    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #04060f;
            --surface: #0b0f1e;
            --surface2: #111629;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #4f6ef7;
            --accent2: #a78bfa;
            --gold: #f5c842;
            --text: #e8ecff;
            --muted: #7580a8;
            --danger: #f87171;
            --glow: rgba(79, 110, 247, 0.35);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;

        }



        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79, 110, 247, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 110, 247, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: rgba(79, 110, 247, 0.13);
            top: -150px;
            left: -150px;
            animation: drift1 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(167, 139, 250, 0.1);
            bottom: -100px;
            right: -100px;
            animation: drift2 25s ease-in-out infinite;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(245, 200, 66, 0.05);
            top: 40%;
            left: 55%;
            animation: drift3 18s ease-in-out infinite;
        }

        @keyframes drift1 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(60px, 40px)
            }
        }

        @keyframes drift2 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-40px, -60px)
            }
        }

        @keyframes drift3 {

            0%,
            100% {
                transform: translate(-50%, -50%)
            }

            50% {
                transform: translate(-44%, -56%)
            }
        }

        /* ── CARD ── */
        .auth-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(32px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: rgba(11, 15, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 40px 36px;
            backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(79, 110, 247, 0.08);
        }

        .logo {
            display: block;
            text-align: center;
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 30%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            margin-bottom: 28px;
        }

        .logo span {
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
        }

        .auth-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 6px;
            text-align: center;
        }

        .auth-sub {
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* ── GOOGLE BTN ── */
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 14px;
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            ;
            transition: all 0.25s;
            margin-bottom: 20px;
        }

        .btn-google:hover {
            border-color: rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-1px);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── DIVIDER ── */
        .divider-line {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .divider-line::before,
        .divider-line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-line span {
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
        }

        /* ── FORM ── */
        .form-group {
            margin-bottom: 16px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-input::placeholder {
            color: rgba(117, 128, 168, 0.6);
        }

        .form-input:focus {
            border-color: rgba(79, 110, 247, 0.5);
            background: rgba(79, 110, 247, 0.05);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
        }

        .form-input.error {
            border-color: rgba(248, 113, 113, 0.5);
        }

        /* password toggle */
        .input-wrap {
            position: relative;
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            ;
            display: flex;
            align-items: center;
            padding: 0;
            transition: color 0.2s;
        }

        .toggle-pass:hover {
            color: var(--text);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.78rem;
            color: var(--accent2);
            text-decoration: none;
            margin-top: 6px;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #fff;
        }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #6d82f8);
            border: none;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            ;
            transition: all 0.25s;
            box-shadow: 0 8px 28px rgba(79, 110, 247, 0.35);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(79, 110, 247, 0.55);
        }

        .btn-submit:disabled {
            opacity: 0.6;
        }

        .btn-submit .btn-text {
            transition: opacity 0.2s;
        }

        .btn-submit .btn-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .btn-submit.loading .btn-spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── ERROR / SUCCESS ── */
        .msg-box {
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.82rem;
            line-height: 1.5;
            margin-top: 14px;
            display: none;
        }

        .msg-box.show {
            display: block;
        }

        .msg-box.error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.25);
            color: #fca5a5;
        }

        .msg-box.success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.25);
            color: #6ee7b7;
        }

        /* ── FOOTER LINK ── */
        .auth-footer {
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 24px;
        }

        .auth-footer a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #fff;
        }

        .back-home {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.78rem;
            color: var(--muted);
            text-decoration: none;
            margin-top: 16px;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
                border-radius: 22px;
            }
        }
    </style>
</head>

<body>
    <!-- BACK NAV -->
    <div style="position:fixed;top:16px;left:16px;z-index:100">
        <a href="../index.html"
            style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e8ecff;text-decoration:none;font-size:0.8rem;font-weight:600;backdrop-filter:blur(10px)">←
            Bosh sahifa</a>
    </div>


    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="auth-wrap">
        <div class="auth-card">
            <a href="../select-language.html" class="logo">Lingua<span>Verse</span></a>

            <h1 class="auth-title">Qaytib keldingiz! 👋</h1>
            <p class="auth-sub">Hisobingizga kiring va o'rganishni davom ettiring.</p>

            <!-- Google -->
            <button class="btn-google" id="googleBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Google bilan kirish
            </button>

            <div class="divider-line"><span>yoki email bilan</span></div>

            <!-- Email/Password form -->
            <div class="form-group">
                <label class="form-label">Email manzil</label>
                <input type="email" id="emailInput" class="form-input" placeholder="siz@example.com"
                    autocomplete="email" />
            </div>

            <div class="form-group">
                <label class="form-label">Parol</label>
                <div class="input-wrap">
                    <input type="password" id="passInput" class="form-input" placeholder="Parolingizni kiriting"
                        autocomplete="current-password" />
                    <button class="toggle-pass" id="togglePass" type="button" aria-label="Parolni ko'rsatish">
                        <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
                <a href="forgot.html" class="forgot-link">Parolni unutdingizmi?</a>
            </div>

            <div class="msg-box" id="msgBox"></div>

            <button class="btn-submit" id="loginBtn">
                <span class="btn-text">Kirish →</span>
                <div class="btn-spinner"></div>
            </button>

            <p class="auth-footer">
                Hisobingiz yo'qmi? <a href="register.html">Ro'yxatdan o'ting</a>
            </p>
        </div>

        <a href="../home.html" class="back-home">
            ← Bosh sahifaga qaytish
        </a>
    </div>

    <!-- Firebase -->
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup,
            onAuthStateChanged,
            browserLocalPersistence,
            setPersistence
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import {
            getFirestore, doc, getDoc, setDoc, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArSlWIz3Z9NsUZowCiFj-snKccQfDnm5w",  // ← NOTO'G'RI!
            authDomain: "linguaverse-ebe09.firebaseapp.com",
            projectId: "linguaverse-ebe09",
            storageBucket: "linguaverse-ebe09.firebasestorage.app",
            messagingSenderId: "130625454868",
            appId: "1:130625454868:web:3f02871f64cb5f8af27801"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Persistence o'rnatish
        await setPersistence(auth, browserLocalPersistence);

        // Redirect if already logged in
        onAuthStateChanged(auth, user => {
            if (user) redirectAfterLogin();
        });

        function redirectAfterLogin() {
            const intended = sessionStorage.getItem('intendedPlan');
            if (intended) {
                sessionStorage.removeItem('intendedPlan');
                window.location.href = '../order.html?plan=' + intended;
            } else {
                window.location.href = '../select-language.html';
            }
        }

        // Ensure user doc in Firestore
        async function ensureUserDoc(user) {
            const ref = doc(db, 'users', user.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    xp: 0,
                    coins: 0,
                    plan: 'free',
                    createdAt: serverTimestamp()
                });
            }
        }

        function showMsg(text, type = 'error') {
            const box = document.getElementById('msgBox');
            box.textContent = text;
            box.className = 'msg-box show ' + type;
        }

        function setLoading(btn, state) {
            btn.disabled = state;
            btn.classList.toggle('loading', state);
        }

        // ── EMAIL / PASSWORD LOGIN ──
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !pass) { showMsg('Email va parolni kiriting.'); return; }

            setLoading(btn, true);
            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                await ensureUserDoc(cred.user);
                showMsg('Muvaffaqiyatli kirildi! Yo\'naltirilmoqda...', 'success');
                setTimeout(redirectAfterLogin, 800);
            } catch (err) {
                const msgs = {
                    'auth/user-not-found': 'Bu email bilan foydalanuvchi topilmadi.',
                    'auth/wrong-password': 'Parol noto\'g\'ri. Qayta urinib ko\'ring.',
                    'auth/invalid-email': 'Email manzil noto\'g\'ri formatda.',
                    'auth/too-many-requests': 'Juda ko\'p urinish. Biroz kutib turing.',
                    'auth/invalid-credential': 'Email yoki parol noto\'g\'ri.',
                };
                showMsg(msgs[err.code] || 'Xato yuz berdi: ' + err.message);
                setLoading(btn, false);
            }
        });

        // Enter key
        document.getElementById('passInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        // ── GOOGLE LOGIN ──
        document.getElementById('googleBtn').addEventListener('click', async () => {
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;
            btn.textContent = 'Yuklanmoqda...';
            try {
                const result = await signInWithPopup(auth, provider);
                await ensureUserDoc(result.user);
                showMsg('Google bilan muvaffaqiyatli kirildi!', 'success');
                setTimeout(redirectAfterLogin, 800);
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showMsg('Google bilan kirishda xato: ' + err.message);
                }
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google bilan kirish`;
            }
        });

        // ── PASSWORD TOGGLE ──
        document.getElementById('togglePass').addEventListener('click', () => {
            const inp = document.getElementById('passInput');
            const icon = document.getElementById('eyeIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
            } else {
                inp.type = 'password';
                icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
            }
        });
    </script>


</body>

</html>
