<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ro'yxatdan o'tish — SpeakVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;700&family=Exo+2:wght@400;600;800;900&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cinzel', serif;

    }

    :root {
      --bg: #04060f;
      --surface: #0b0f1e;
      --surface2: #111629;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #4f6ef7;
      --accent2: #a78bfa;
      --gold: #f5c842;
      --text: #e8ecff;
      --muted: #7580a8;
      --success: #34d399;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
      ;
    }




    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 110, 247, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 110, 247, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: rgba(167, 139, 250, 0.12);
      top: -150px;
      right: -100px;
      animation: drift1 22s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: rgba(79, 110, 247, 0.1);
      bottom: -100px;
      left: -100px;
      animation: drift2 25s ease-in-out infinite;
    }

    .orb-3 {
      width: 280px;
      height: 280px;
      background: rgba(245, 200, 66, 0.05);
      top: 60%;
      left: 60%;
      animation: drift3 18s ease-in-out infinite;
    }

    @keyframes drift1 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(-50px, 40px)
      }
    }

    @keyframes drift2 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(40px, -50px)
      }
    }

    @keyframes drift3 {

      0%,
      100% {
        transform: translate(-50%, -50%)
      }

      50% {
        transform: translate(-44%, -56%)
      }
    }

    /* ── CARD ── */
    .auth-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 20px;
      animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-card {
      background: rgba(11, 15, 30, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 40px 36px;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(167, 139, 250, 0.06);
    }

    .logo {
      display: block;
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      margin-bottom: 28px;
    }

    .logo span {
      color: var(--accent);
      -webkit-text-fill-color: var(--accent);
    }

    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 6px;
      text-align: center;
    }

    .auth-sub {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* Google */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      ;
      transition: all 0.25s;
      margin-bottom: 20px;
    }

    .btn-google:hover {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.07);
      transform: translateY(-1px);
    }

    .btn-google svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .divider-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .divider-line::before,
    .divider-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-line span {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Form */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: all 0.2s;
    }

    .form-input::placeholder {
      color: rgba(117, 128, 168, 0.6);
    }

    .form-input:focus {
      border-color: rgba(79, 110, 247, 0.5);
      background: rgba(79, 110, 247, 0.05);
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
    }

    .form-input.error {
      border-color: rgba(248, 113, 113, 0.5);
    }

    .input-wrap {
      position: relative;
    }

    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      ;
      display: flex;
      align-items: center;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-pass:hover {
      color: var(--text);
    }

    /* Password strength */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .strength-seg {
      flex: 1;
      height: 3px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.3s;
    }

    .strength-seg.weak {
      background: #f87171;
    }

    .strength-seg.fair {
      background: var(--gold);
    }

    .strength-seg.strong {
      background: var(--success);
    }

    .strength-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Terms */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 16px 0;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .terms-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      accent-color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
      ;
    }

    .terms-row a {
      color: var(--accent2);
      text-decoration: none;
    }

    .terms-row a:hover {
      color: #fff;
    }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      ;
      transition: all 0.25s;
      box-shadow: 0 8px 28px rgba(167, 139, 250, 0.3);
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(167, 139, 250, 0.5);
    }

    .btn-submit:disabled {
      opacity: 0.6;
    }

    .btn-submit .btn-text {
      transition: opacity 0.2s;
    }

    .btn-submit .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-submit.loading .btn-text {
      display: none;
    }

    .btn-submit.loading .btn-spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Messages */
    .msg-box {
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.82rem;
      line-height: 1.5;
      margin-top: 14px;
      display: none;
    }

    .msg-box.show {
      display: block;
    }

    .msg-box.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: #fca5a5;
    }

    .msg-box.success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.25);
      color: #6ee7b7;
    }

    /* Perks banner */
    .perks {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .perk {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
    }

    .perk .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .auth-footer {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 22px;
    }

    .auth-footer a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-footer a:hover {
      color: #fff;
    }

    .back-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      margin-top: 16px;
      transition: color 0.2s;
    }

    .back-home:hover {
      color: var(--text);
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 30px 20px;
        border-radius: 22px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  
    /* ── FONT AWESOME FIX: universal reset ::before shriftini buzmasligi uchun ── */
    .fa, .fas, .far, .fab, .fa-solid, .fa-regular,
    .fa::before, .fas::before, .far::before, .fa-solid::before, .fa-regular::before {
      font-family: "Font Awesome 6 Free" !important;
    }
    .fa-brands, .fab, .fa-brands::before, .fab::before {
      font-family: "Font Awesome 6 Brands" !important;
    }
    .fa-solid, .fas, .fa-solid::before, .fas::before { font-weight: 900; }
  
</style>
</head>

<body>
  <!-- BACK NAV -->
  <div style="position:fixed;top:16px;left:16px;z-index:100">
    <a href="../index.html"
      style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e8ecff;text-decoration:none;font-size:0.8rem;font-weight:600;backdrop-filter:blur(10px)">←
      Bosh sahifa</a>
  </div>


  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <a href="../home.html" class="logo">Speak<span>Verse</span></a>

      <h1 class="auth-title">Hisob yarating 🚀</h1>
      <p class="auth-sub">Bepul ro'yxatdan o'ting va til o'rganishni boshlang.</p>

      <!-- Perks -->
      <div class="perks">
        <div class="perk"><span class="dot"></span>Kredit karta shart emas</div>
        <div class="perk"><span class="dot"></span>Bepul boshlash</div>
        <div class="perk"><span class="dot"></span>1 daqiqada tayyor</div>
      </div>

      <!-- Google -->
      <button class="btn-google" id="googleBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Google bilan ro'yxatdan o'tish
      </button>

      <div class="divider-line"><span>yoki email bilan</span></div>

      <!-- Name row -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ism</label>
          <input type="text" id="firstNameInput" class="form-input" placeholder="Sardor" autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label class="form-label">Familiya</label>
          <input type="text" id="lastNameInput" class="form-input" placeholder="Toshmatov" autocomplete="family-name" />
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email manzil</label>
        <input type="email" id="emailInput" class="form-input" placeholder="siz@example.com" autocomplete="email" />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Parol</label>
        <div class="input-wrap">
          <input type="password" id="passInput" class="form-input" placeholder="Kamida 8 ta belgi"
            autocomplete="new-password" />
          <button class="toggle-pass" id="togglePass" type="button">
            <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <!-- Confirm password -->
      <div class="form-group">
        <label class="form-label">Parolni tasdiqlang</label>
        <div class="input-wrap">
          <input type="password" id="confirmPassInput" class="form-input" placeholder="Parolni qayta kiriting"
            autocomplete="new-password" />
          <button class="toggle-pass" id="toggleConfirm" type="button">
            <svg id="eyeIcon2" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Terms -->
      <label class="terms-row">
        <input type="checkbox" id="termsCheck" />
        <span>Men <a href="#">Foydalanish shartlari</a> va <a href="#">Maxfiylik siyosati</a>ga roziman</span>
      </label>

      <div class="msg-box" id="msgBox"></div>

      <button class="btn-submit" id="registerBtn">
        <span class="btn-text">Hisob yaratish →</span>
        <div class="btn-spinner"></div>
      </button>

      <p class="auth-footer">
        Allaqachon hisobingiz bormi? <a href="login.html">Kirish</a>
      </p>
    </div>

    <a href="../home.html" class="back-home">
      ← Bosh sahifaga qaytish
    </a>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      updateProfile,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, getDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyArSlWIz3Z9NsUZowCiFj-snKccQfDnm5w",
      authDomain: "linguaverse-ebe09.firebaseapp.com",
      projectId: "linguaverse-ebe09",
      storageBucket: "linguaverse-ebe09.firebasestorage.app",
      messagingSenderId: "130625454868",
      appId: "1:130625454868:web:3f02871f64cb5f8af27801",
      measurementId: "G-HJYYGFCZZB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Redirect if already logged in
    onAuthStateChanged(auth, user => { if (user) redirectAfterLogin(); });

    function redirectAfterLogin() {
      const params = new URLSearchParams(window.location.search);
      const plan = params.get('plan') || sessionStorage.getItem('intendedPlan');
      if (plan) {
        sessionStorage.removeItem('intendedPlan');
        window.location.href = '../order.html?plan=' + plan;
      } else {
        window.location.href = '../select-language.html';
      }
    }

    async function createUserDoc(user, displayName) {
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          uid: user.uid,
          email: user.email,
          displayName: displayName || user.displayName || user.email.split('@')[0],
          xp: 0,
          coins: 50,         // welcome bonus
          plan: 'free',
          streak: 0,
          createdAt: serverTimestamp()
        });
      }
    }

    function showMsg(text, type = 'error') {
      const box = document.getElementById('msgBox');
      box.textContent = text;
      box.className = 'msg-box show ' + type;
    }

    function setLoading(btn, state) {
      btn.disabled = state;
      btn.classList.toggle('loading', state);
    }

    // ── EMAIL/PASSWORD REGISTER ──
    document.getElementById('registerBtn').addEventListener('click', async () => {
      const first = document.getElementById('firstNameInput').value.trim();
      const last = document.getElementById('lastNameInput').value.trim();
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const confirm = document.getElementById('confirmPassInput').value;
      const terms = document.getElementById('termsCheck').checked;
      const btn = document.getElementById('registerBtn');

      if (!first || !email || !pass) { showMsg('Barcha majburiy maydonlarni to\'ldiring.'); return; }
      if (pass.length < 8) { showMsg('Parol kamida 8 ta belgi bo\'lishi kerak.'); return; }
      if (pass !== confirm) { showMsg('Parollar mos kelmaydi.'); return; }
      if (!terms) { showMsg('Foydalanish shartlariga rozilik bildiring.'); return; }

      const displayName = last ? first + ' ' + last : first;
      setLoading(btn, true);

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName });
        await createUserDoc(cred.user, displayName);
        showMsg('🎉 Hisob muvaffaqiyatli yaratildi! Yo\'naltirilmoqda...', 'success');
        setTimeout(redirectAfterLogin, 1000);
      } catch (err) {
        const msgs = {
          'auth/email-already-in-use': 'Bu email allaqachon ro\'yxatdan o\'tgan. Kiring yoki boshqa email ishlating.',
          'auth/invalid-email': 'Email manzil noto\'g\'ri formatda.',
          'auth/weak-password': 'Parol juda zaif. Kuchliroq parol tanlang.',
        };
        showMsg(msgs[err.code] || 'Xato: ' + err.message);
        setLoading(btn, false);
      }
    });

    // ── GOOGLE REGISTER ──
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.textContent = 'Yuklanmoqda...';
      try {
        const result = await signInWithPopup(auth, provider);
        await createUserDoc(result.user, result.user.displayName);
        showMsg('🎉 Google bilan muvaffaqiyatli ro\'yxatdan o\'tdingiz!', 'success');
        setTimeout(redirectAfterLogin, 800);
      } catch (err) {
        if (err.code === 'auth/unauthorized-domain') {
          showMsg("Bu domen Firebase'da ruxsat etilmagan. Admin: Firebase Console → Authentication → Settings → Authorized domains ga sayt domenini qo'shishi kerak.");
        } else if (err.code !== 'auth/popup-closed-by-user') {
          showMsg('Google bilan ro\'yxatdan o\'tishda xato: ' + err.message);
        }
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google bilan ro'yxatdan o'tish`;
      }
    });

    // ── PASSWORD STRENGTH ──
    document.getElementById('passInput').addEventListener('input', () => {
      const val = document.getElementById('passInput').value;
      const segs = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
      const lbl = document.getElementById('strengthLabel');
      segs.forEach(s => s.className = 'strength-seg');

      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      if (val.length === 0) { lbl.textContent = ''; return; }

      const levels = [
        { cls: 'weak', label: 'Zaif parol', count: 1 },
        { cls: 'fair', label: 'O\'rtacha parol', count: 2 },
        { cls: 'strong', label: 'Kuchli parol', count: 3 },
        { cls: 'strong', label: 'Juda kuchli parol ✓', count: 4 },
      ];

      const level = levels[Math.min(score, 4) - 1] || levels[0];
      for (let i = 0; i < level.count; i++) segs[i].classList.add(level.cls);
      lbl.textContent = level.label;
      lbl.style.color = level.cls === 'weak' ? '#f87171' : level.cls === 'fair' ? '#f5c842' : 'var(--success)';
    });

    // ── PASSWORD TOGGLES ──
    function makeToggle(btnId, inputId, iconId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const inp = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (inp.type === 'password') {
          inp.type = 'text';
          icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
        } else {
          inp.type = 'password';
          icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        }
      });
    }
    makeToggle('togglePass', 'passInput', 'eyeIcon');
    makeToggle('toggleConfirm', 'confirmPassInput', 'eyeIcon2');
  </script>
