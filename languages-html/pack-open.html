<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LinguaVerse — Pack Opener</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #06080e;
            --bg2: #0c0f1a;
            --bg3: #111624;
            --text: #eef0ff;
            --text2: #8b92b8;
            --text3: #424a6e;
            --border: rgba(255, 255, 255, 0.07);
            --font-h: 'Barlow Condensed', sans-serif;
            --font-b: 'Barlow', sans-serif;
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-b);
            min-height: 100vh;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 100px
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px
        }

        /* NAV */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6, 8, 14, 0.96);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 54px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .nav-logo {
            font-family: var(--font-h);
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: .06em;
            text-decoration: none;
            color: var(--text)
        }

        .nav-logo span {
            background: linear-gradient(135deg, #5b7cfa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .nav-spacer {
            flex: 1
        }

        .nav-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 4px 12px;
            font-family: var(--font-h);
            font-size: .9rem;
            font-weight: 700;
            white-space: nowrap
        }

        .nav-stat i {
            font-size: .85rem
        }

        /* HERO */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 36px 20px 16px
        }

        .hero-label {
            display: inline-block;
            font-family: var(--font-h);
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: #5b7cfa;
            border: 1px solid rgba(91, 124, 250, 0.3);
            border-radius: 3px;
            padding: 4px 14px;
            margin-bottom: 12px
        }

        .hero h1 {
            font-family: var(--font-h);
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: .04em;
            line-height: 1;
            margin-bottom: 8px;
            text-transform: uppercase
        }

        .hero h1 em {
            font-style: normal;
            background: linear-gradient(135deg, #f5c842, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hero-sub {
            font-size: .85rem;
            color: var(--text2);
            max-width: 460px;
            margin: 0 auto
        }

        /* WALLET */
        .wallet-row {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 12px 20px 0
        }

        .wcell {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 7px 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .wcell i {
            font-size: .95rem
        }

        .wcell-val {
            font-family: var(--font-h);
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: .03em
        }

        .wcell-lbl {
            font-size: .62rem;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em
        }

        /* FILTER */
        .filter-row {
            position: sticky;
            top: 54px;
            z-index: 99;
            background: rgba(6, 8, 14, 0.96);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-top: 14px
        }

        .filter-row::-webkit-scrollbar {
            display: none
        }

        .ftab {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-h);
            font-size: .85rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 5px
        }

        .ftab.active {
            background: rgba(91, 124, 250, 0.15);
            border-color: rgba(91, 124, 250, 0.5);
            color: #a78bfa
        }

        .ftab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text)
        }

        .ftab i {
            font-size: .82rem
        }

        /* MAIN */
        .main {
            position: relative;
            z-index: 1;
            max-width: 1120px;
            margin: 0 auto;
            padding: 18px 20px 80px
        }

        /* ═══ PACK CARD ═══ */
        .packs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 10px
        }

        .pc {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .28s cubic-bezier(.34, 1.56, .64, 1), box-shadow .28s;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: var(--bg3)
        }

        .pc:hover {
            transform: translateY(-7px) scale(1.025);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6)
        }

        .pc-stripe {
            height: 3px;
            width: 100%
        }

        /* Pack visual */
        .pc-visual {
            position: relative;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        .pc-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 20%, rgba(255, 255, 255, 0.07) 0%, transparent 65%);
            pointer-events: none
        }

        /* TCG-style pack shape */
        .pack-shape {
            position: relative;
            width: 76px;
            height: 108px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px 8px;
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.18), inset 0 -1px 0 rgba(0, 0, 0, 0.3);
            transition: transform .3s;
            overflow: hidden;
        }

        .pc:hover .pack-shape {
            transform: rotate(-5deg) scale(1.1)
        }

        .pack-shape::before {
            content: '';
            position: absolute;
            top: 0;
            left: -60%;
            width: 35%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
            transform: skewX(-12deg);
            transition: left .55s ease;
        }

        .pc:hover .pack-shape::before {
            left: 130%
        }

        /* Holographic strip */
        .pack-shape::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.18));
            opacity: .7
        }

        .ps-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            z-index: 1
        }

        .ps-brand {
            font-family: var(--font-h);
            font-size: .48rem;
            font-weight: 800;
            letter-spacing: .16em;
            text-transform: uppercase;
            opacity: .75
        }

        .ps-num {
            font-family: var(--font-h);
            font-size: .48rem;
            font-weight: 800;
            letter-spacing: .1em;
            opacity: .75
        }

        .ps-icon {
            font-size: 1.9rem;
            z-index: 1;
            line-height: 1;
            margin: auto 0
        }

        .ps-footer {
            z-index: 1;
            text-align: center;
            width: 100%
        }

        .ps-name {
            font-family: var(--font-h);
            font-size: .6rem;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            line-height: 1.1
        }

        .ps-series {
            font-family: var(--font-h);
            font-size: .45rem;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            opacity: .6;
            margin-top: 2px
        }

        /* FA icon in pack */
        .ps-fa {
            font-size: 1.7rem;
            z-index: 1;
            margin: auto 0
        }

        .pc-body {
            padding: 10px 12px 13px
        }

        .pc-rarity {
            font-family: var(--font-h);
            font-size: .58rem;
            font-weight: 800;
            letter-spacing: .16em;
            text-transform: uppercase;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .pc-rarity i {
            font-size: .6rem
        }

        .pc-name {
            font-family: var(--font-h);
            font-size: 1.02rem;
            font-weight: 900;
            letter-spacing: .03em;
            line-height: 1.1;
            margin-bottom: 4px
        }

        .pc-desc {
            font-size: .68rem;
            color: var(--text2);
            margin-bottom: 7px;
            line-height: 1.4
        }

        .pc-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-bottom: 8px
        }

        .pc-tag {
            font-family: var(--font-h);
            font-size: .6rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 3px;
            letter-spacing: .04em;
            display: flex;
            align-items: center;
            gap: 3px
        }

        .pc-tag i {
            font-size: .58rem
        }

        .pc-btns {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .pc-btn {
            width: 100%;
            padding: 7px 8px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-family: var(--font-h);
            font-size: .78rem;
            font-weight: 800;
            letter-spacing: .04em;
            transition: all .15s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px
        }

        .pc-btn i {
            font-size: .75rem
        }

        .pc-btn:hover {
            filter: brightness(1.18);
            transform: translateY(-1px)
        }

        /* ═══ OVERLAY ═══ */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .overlay.open {
            display: flex;
            animation: ovIn .3s ease
        }

        @keyframes ovIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .ov-bg {
            position: absolute;
            inset: 0;
            background: rgba(4, 5, 10, 0.97);
            backdrop-filter: blur(22px)
        }

        .opener-inner {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px
        }

        .ov-close {
            position: absolute;
            top: -8px;
            right: 0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            color: var(--text2);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            z-index: 10
        }

        .ov-close:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text)
        }

        .ov-title {
            font-family: var(--font-h);
            font-size: 1.9rem;
            font-weight: 900;
            letter-spacing: .06em;
            text-transform: uppercase;
            text-align: center
        }

        .ov-hint {
            font-size: .85rem;
            color: var(--text2);
            text-align: center;
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .ov-hint i {
            font-size: .9rem
        }

        /* Pack card in opener — bigger TCG card */
        .ov-pack-wrap {
            position: relative;
            width: 210px;
            height: 294px;
            cursor: pointer;
            transition: transform .3s
        }

        .ov-pack-wrap:hover {
            transform: translateY(-5px) rotate(-1deg)
        }

        .ov-pack-card {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 18px 18px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.75), inset 0 1px 0 rgba(255, 255, 255, 0.18), inset 0 -1px 0 rgba(0, 0, 0, 0.35);
            transition: all .3s;
        }

        .ov-pack-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 15%, rgba(255, 255, 255, 0.12) 0%, transparent 55%);
            pointer-events: none
        }

        /* Holo lines */
        .ov-pack-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.06));
            opacity: .8
        }

        .ov-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            z-index: 1
        }

        .ov-brand {
            font-family: var(--font-h);
            font-size: .6rem;
            font-weight: 800;
            letter-spacing: .16em;
            text-transform: uppercase
        }

        .ov-num {
            font-family: var(--font-h);
            font-size: .6rem;
            font-weight: 800;
            letter-spacing: .1em
        }

        .ov-icon-wrap {
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1
        }

        .ov-pack-fa {
            font-size: 4.5rem;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.25));
            transition: transform .3s
        }

        .ov-pack-wrap:hover .ov-pack-fa {
            transform: scale(1.1) rotate(-6deg)
        }

        .ov-footer {
            z-index: 1;
            text-align: center;
            width: 100%
        }

        .ov-pname {
            font-family: var(--font-h);
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: .06em;
            text-transform: uppercase;
            line-height: 1.1
        }

        .ov-pseries {
            font-family: var(--font-h);
            font-size: .55rem;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
            opacity: .6;
            margin-top: 4px
        }

        /* Shine sweep */
        .ov-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 45%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
            transform: skewX(-14deg);
            pointer-events: none;
            transition: none
        }

        .ov-pack-wrap:hover .ov-shine {
            animation: shineAnim .65s ease forwards
        }

        @keyframes shineAnim {
            to {
                left: 160%
            }
        }

        /* ═══ REEL ═══ */
        .reel-wrap {
            width: 100%;
            max-width: 520px;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(4, 6, 14, 0.99);
            display: none
        }

        .reel-ptr {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            background: linear-gradient(to bottom, transparent, #f5c842 25%, #f5c842 75%, transparent);
            z-index: 3;
            pointer-events: none
        }

        .reel-ptr::before,
        .reel-ptr::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent
        }

        .reel-ptr::before {
            top: 0;
            border-bottom-color: #f5c842
        }

        .reel-ptr::after {
            bottom: 0;
            border-top-color: #f5c842
        }

        .reel-fade-l {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 65px;
            background: linear-gradient(to right, rgba(4, 6, 14, 1), transparent);
            z-index: 2;
            pointer-events: none
        }

        .reel-fade-r {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 65px;
            background: linear-gradient(to left, rgba(4, 6, 14, 1), transparent);
            z-index: 2;
            pointer-events: none
        }

        .reel-track {
            display: flex;
            gap: 6px;
            padding: 8px;
            will-change: transform
        }

        .reel-item {
            flex: 0 0 84px;
            height: 84px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: 1.5px solid transparent;
            background: rgba(255, 255, 255, 0.03);
            flex-shrink: 0
        }

        .reel-item i {
            font-size: 1.5rem
        }

        .ri-lbl {
            font-family: var(--font-h);
            font-size: .5rem;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: .07em;
            text-transform: uppercase
        }

        .ri-c {
            border-color: rgba(130, 130, 130, 0.22)
        }

        .ri-r {
            border-color: rgba(91, 124, 250, 0.5);
            background: rgba(91, 124, 250, 0.07)
        }

        .ri-e {
            border-color: rgba(167, 139, 250, 0.6);
            background: rgba(167, 139, 250, 0.09)
        }

        .ri-l {
            border-color: rgba(245, 200, 66, 0.7);
            background: rgba(245, 200, 66, 0.09);
            box-shadow: 0 0 16px rgba(245, 200, 66, 0.1)
        }

        .ri-m {
            border-color: rgba(220, 40, 240, 0.8);
            background: rgba(220, 40, 240, 0.09);
            box-shadow: 0 0 20px rgba(220, 40, 240, 0.14)
        }

        /* Open btn */
        .ov-btn {
            padding: 13px 42px;
            border: none;
            cursor: pointer;
            font-family: var(--font-h);
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: .1em;
            text-transform: uppercase;
            border-radius: 8px;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 9px
        }

        .ov-btn i {
            font-size: 1rem
        }

        .ov-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.18)
        }

        .ov-btn:disabled {
            opacity: .32;
            cursor: not-allowed;
            transform: none
        }

        /* ═══ WIN SCREEN ═══ */
        .win-screen {
            display: none;
            position: relative;
            width: 100%;
            flex-direction: column;
            align-items: center;
            gap: 10px
        }

        .win-screen.show {
            display: flex;
            animation: fadeUp .4s ease
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* Big "YOU WON" banner */
        .win-banner {
            width: 100%;
            max-width: 440px;
            border-radius: 14px;
            padding: 22px 24px 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .win-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.08) 0%, transparent 65%);
            pointer-events: none
        }

        .win-banner-label {
            font-family: var(--font-h);
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .2em;
            text-transform: uppercase;
            opacity: .8;
            margin-bottom: 6px
        }

        .win-banner-title {
            font-family: var(--font-h);
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: .06em;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 4px
        }

        .win-banner-sub {
            font-size: .82rem;
            opacity: .7
        }

        /* Reward items */
        .rew-item {
            width: 100%;
            max-width: 420px;
            border-radius: 10px;
            padding: 13px 18px;
            display: flex;
            align-items: center;
            gap: 12px;

                const wrap = document.getElementById('ovPackWrap');
                let sh = 0, shIv = setInterval(() => {
                    const x = (Math.random() - .5) * 14, y = (Math.random() - .5) * 8;
                    wrap.style.transform = `translate(${x}px,${y}px) rotate(${x * 0.5}deg)`;
                    sh++; if (sh > 14) { clearInterval(shIv); wrap.style.transform = ''; }

                setTimeout(() => {

                openPhase = 2;
                document.getElementById('ovBtn').disabled = true;

        // ══════════ REEL — 10 SECOND FAST ══════════
        function runReel() {
            const track = document.getElementById('reelTrack');
            const W = 90, total = 70;
            const rewards = calcRewards(currentPack);
            const winIdx = Math.floor(total * 0.68 + Math.random() * 6);
            const winItem = getWinnerItem(rewards);

            const items = [];
            for (let i = 0; i < total; i++) items.push(i === winIdx ? winItem : REEL_POOL[Math.floor(Math.random() * REEL_POOL.length)]);
            track.innerHTML = items.map(it => `<div class="reel-item ${it.cls}"><i class="fa-solid ${it.fa}" style="color:${it.col}"></i><span class="ri-lbl">${it.lbl}</span></div>`).join('');

            const viewW = 520;
            const center = Math.floor(viewW / W / 2) * W;
            const target = -(winIdx * W - center + W / 2);

            // Phase 1: fast (0-7s), Phase 2: slow (7-10s)
            let cur = 0, done = false;
            const FAST_VEL = 45; // pixels per frame — very fast start
            const slowStart = target + W * 12; // begin slowing when 12 items away
            let vel = FAST_VEL;
            let startTime = null;

            function af(ts) {
                if (done) return;
                if (!startTime) startTime = ts;
                const elapsed = (ts - startTime) / 1000; // seconds

                // Dynamic velocity: fast first 7s, then ease to stop
                if (cur <= slowStart) {
                    vel = Math.max(vel * 0.9725, 0.4); // exponential slow
                } else {
                    // Still far — keep fast
                    vel = FAST_VEL;
                }

                cur -= vel;
                if (cur <= target) {
                    cur = target; done = true;
                    track.style.transform = `translateX(${cur}px)`;
                    doFlash();
                    // Highlight winning cell
                    const cells = track.querySelectorAll('.reel-item');
                    if (cells[winIdx]) cells[winIdx].style.transform = 'scale(1.12)';
                    setTimeout(() => showRewards(rewards), 800);
                    return;
                }
                track.style.transform = `translateX(${cur}px)`;
                requestAnimationFrame(af);
            }
            requestAnimationFrame(af);
        }

        function getWinnerItem(r) {
            if (r.vip) return { fa: 'fa-crown', lbl: 'VIP!', cls: 'ri-m', col: '#e050f8' };
            if (r.frame) return { fa: 'fa-image', lbl: 'Frame!', cls: 'ri-l', col: '#f5c842' };
            if (r.key) return { fa: 'fa-key', lbl: 'Kalit!', cls: 'ri-e', col: '#a78bfa' };
            if (r.booster) return { fa: 'fa-rocket', lbl: 'Boost!', cls: 'ri-r', col: '#7b6af5' };
            if (r.xp > 3000) return { fa: 'fa-star', lbl: 'MEGA XP', cls: 'ri-l', col: '#f5c842' };
            if (r.xp > 1000) return { fa: 'fa-star', lbl: 'XP', cls: 'ri-e', col: '#a78bfa' };
            if (r.coins > 1000) return { fa: 'fa-coins', lbl: 'MEGA!', cls: 'ri-l', col: '#f5c842' };
            if (r.tokens > 300) return { fa: 'fa-ticket', lbl: 'Token', cls: 'ri-e', col: '#a78bfa' };
            return { fa: 'fa-coins', lbl: 'Coin', cls: 'ri-c', col: '#888' };
        }

        // ══════════ REWARDS ══════════
        function calcRewards(pack) {
            const got = {};
            const g = pack.rewards.filter(r => r.min !== undefined);
            const c = pack.rewards.filter(r => r.ch !== undefined && r.min === undefined);
            if (g.length) {
                const tw = g.reduce((s, r) => s + (r.w || 10), 0);
                let roll = Math.random() * tw;
                for (const r of g) { roll -= (r.w || 10); if (roll <= 0) { const a = Math.floor(r.min + Math.random() * (r.max - r.min + 1)); got[r.type] = a; break; } }
            }
            for (const r of c) if (Math.random() < (r.ch || .1)) got[r.type] = true;
            return got;
        }

        function showRewards(r) {
            const p = currentPack, s = p.style;
            if (r.coins) WALLET.coins += r.coins;
            if (r.tokens) WALLET.tokens += r.tokens;
            if (r.xp) WALLET.xp += r.xp;
            updateWallet();

            document.getElementById('ovPackWrap').style.display = 'none';
            document.getElementById('reelWrap').style.display = 'none';
            document.getElementById('ovBtn').style.display = 'none';
            document.getElementById('ovTitle').style.webkitTextFillColor = 'transparent';

            // Confetti for rare+
            if (['epic', 'legendary', 'mythic'].includes(p.rarity) || r.vip || r.frame) {
                launchConfetti(s.stripe);
            }

            // WIN SCREEN
            const box = document.getElementById('winScreen');
            const rarityBig = { common: 'Common', rare: 'Rare', epic: 'EPIC', legendary: 'LEGENDARY', mythic: 'MYTHIC' };
            let html = `<div class="win-banner" style="background:${s.bg};border:1px solid ${s.stripe}50;box-shadow:0 0 50px ${GLOW[p.rarity]}">
  <div class="win-banner-label" style="color:${s.rc}"><i class="fa-solid fa-trophy"></i> ${rarityBig[p.rarity]} · ${p.name}</div>
  <div class="win-banner-title" style="background:linear-gradient(135deg,${s.stripe},${s.text});-webkit-background-clip:text;-webkit-text-fill-color:transparent">Siz Yutdingiz!</div>
  <div class="win-banner-sub" style="color:${s.text}">Quyidagi mukofotlar qo'shildi</div>
</div>`;

            let delay = 0.05;
            const rew = [];
            if (r.vip) rew.push({ cls: 'rew-vip', fa: 'fa-crown', col: '#f5c842', name: 'VIP STATUS', desc: '30 kunlik VIP faollashdi', val: 'FAOL!' });
            if (r.frame) rew.push({ cls: 'rew-frame', fa: 'fa-image', col: '#c060f0', name: 'Profil Frame', desc: 'Yangi eksklyuziv frame', val: '+1' });
            if (r.key) rew.push({ cls: 'rew-key', fa: 'fa-key', col: '#f5c842', name: 'Oltin Kalit', desc: 'Noyob kalit paket', val: '+1' });
            if (r.booster) rew.push({ cls: 'rew-booster', fa: 'fa-rocket', col: '#fb923c', name: '2× XP Booster', desc: '1 soatlik XP multiplier', val: '1 soat' });
            if (r.coins) rew.push({ cls: 'rew-coins', fa: 'fa-coins', col: '#f5c842', name: 'Coin', desc: 'Hamyoningizga qo\'shildi', val: `+${r.coins.toLocaleString()}` });
            if (r.tokens) rew.push({ cls: 'rew-tokens', fa: 'fa-ticket', col: '#22d3ee', name: 'Token', desc: 'AI chat tokenlari', val: `+${r.tokens.toLocaleString()}` });
            if (r.xp) rew.push({ cls: 'rew-xp', fa: 'fa-star', col: '#a78bfa', name: 'XP', desc: 'Tajriba ballari', val: `+${r.xp.toLocaleString()}` });

            rew.forEach((it, i) => {
                html += `<div class="rew-item ${it.cls}" style="animation-delay:${delay + i * 0.1}s">
  <div class="rew-fa" style="background:${it.col}22"><i class="fa-solid ${it.fa}" style="color:${it.col}"></i></div>
  <div class="rew-info"><div class="rew-name" style="color:${it.col}">${it.name}</div><div class="rew-desc">${it.desc}</div></div>
  <div class="rew-val" style="color:${it.col}">${it.val}</div>
</div>`;
            });

            box.innerHTML = html;
            box.classList.add('show');
            document.getElementById('btnAgain').style.display = 'flex';
            document.getElementById('ovHint').innerHTML = `<i class="fa-solid fa-party-horn" style="color:${s.stripe}"></i> Tabriklaymiz!`;
            toast('Pack ochildi! Mukofotlar qo\'shildi', 's', 'fa-party-horn');
        }

        function onAgain() { closeOverlay(); if (currentPack) openBuyModal(currentPack.id); }
        function closeOverlay() { document.getElementById('overlay').classList.remove('open'); openPhase = 0; stopConfetti(); }

        // ══════════ CONFETTI ══════════
        let confettiAF = null, confettiParts = [];
        function launchConfetti(col) {
            const cv = document.getElementById('confettiCanvas');
            cv.width = innerWidth; cv.height = innerHeight; cv.style.display = 'block';
            const ctx = cv.getContext('2d');
            confettiParts = [];
            const colors = [col, '#f5c842', '#a78bfa', '#22d3ee', '#f87171', '#34d399', '#fb923c'];
            for (let i = 0; i < 130; i++) {
                confettiParts.push({
                    x: innerWidth / 2 + (Math.random() - .5) * 120,
                    y: innerHeight / 2 + (Math.random() - .5) * 80,
                    vx: (Math.random() - .5) * 14,
                    vy: -(Math.random() * 14 + 6),
                    rot: Math.random() * 360,
                    rotV: (Math.random() - .5) * 12,
                    w: 8 + Math.random() * 8,
                    h: 4 + Math.random() * 4,
                    col: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1, life: 1
                });
            }
            let t = 0;
            function loop() {
                ctx.clearRect(0, 0, cv.width, cv.height);
                let alive = false;
                confettiParts.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.38; p.rot += p.rotV; p.life -= 0.012; p.alpha = Math.max(0, p.life);
                    if (p.life > 0) { alive = true; }
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
                });
                t++; if (alive && t < 240) confettiAF = requestAnimationFrame(loop);
                else { cv.style.display = 'none'; ctx.clearRect(0, 0, cv.width, cv.height); }
            }
            if (confettiAF) cancelAnimationFrame(confettiAF);
            confettiAF = requestAnimationFrame(loop);
        }
        function stopConfetti() {
            if (confettiAF) cancelAnimationFrame(confettiAF);
            const cv = document.getElementById('confettiCanvas');
            cv.style.display = 'none';
            cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
        }

        // ══════════ FILTER ══════════
        function filterPacks(r, btn) {
            currentFilter = r;
            document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active'); renderPacks();
        }

        // ══════════ FLASH ══════════
        function doFlash() {
            const f = document.createElement('div'); f.className = 'flash'; document.body.appendChild(f);
            setTimeout(() => f.remove(), 600);
        }

        // ══════════ WALLET ══════════
        function updateWallet() {
            const f = n => n.toLocaleString();
            document.getElementById('nCoin').textContent = f(WALLET.coins);
            document.getElementById('wCoin').textContent = f(WALLET.coins);
            document.getElementById('nXP').textContent = f(WALLET.xp);
            document.getElementById('wXP').textContent = f(WALLET.xp);
            document.getElementById('nTok').textContent = f(WALLET.tokens);
            document.getElementById('wTok').textContent = f(WALLET.tokens);
        }

        // ══════════ TOAST ══════════
        function toast(msg, type, fa) {
            const t = document.getElementById('toast');
            document.getElementById('toastIcon').className = `fa-solid ${fa || 'fa-check'}`;
            document.getElementById('toastMsg').textContent = msg;
            t.className = 'toast ' + type + ' show';
            clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3400);
        }

        renderPacks();
    </script>
</body>

</html>
