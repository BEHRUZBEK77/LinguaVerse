<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaVerse — Rejalar va To'lov</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    :root {
      --bg: #04060f; --surface: #0b0f1e; --surface2: #111629;
      --border: rgba(255,255,255,0.07); --accent: #4f6ef7; --accent2: #a78bfa;
      --gold: #f5c842; --green: #34d399; --red: #f87171;
      --text: #e8ecff; --muted: #7580a8;
    }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(79,110,247,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(79,110,247,0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; height: 62px; background: rgba(4,6,15,0.8); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); }
    .logo { font-size: 1.2rem; font-weight: 800; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 0.78rem; font-weight: 600; padding: 7px 13px; border-radius: 10px; transition: all .2s; white-space: nowrap; }
    .nav-links a:hover { color: var(--text); background: var(--surface); }
    .wrap { position: relative; max-width: 1080px; margin: 0 auto; padding: 40px 18px 90px; }
    .head { text-align: center; margin-bottom: 36px; }
    .head h1 { font-size: clamp(1.8rem, 5vw, 2.7rem); font-weight: 800; margin-bottom: 10px; }
    .head h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .head p { color: var(--muted); font-size: 0.92rem; }
    .plans { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 18px; margin-bottom: 44px; }
    .plan { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 26px; position: relative; transition: all .25s; cursor: pointer; }
    .plan:hover { transform: translateY(-4px); }
    .plan.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 18px 50px rgba(79,110,247,0.22); }
    .plan-badge { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 0.68rem; font-weight: 800; padding: 4px 13px; border-radius: 100px; white-space: nowrap; }
    .plan-ic { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; margin-bottom: 14px; }
    .plan-nm { font-size: 1.15rem; font-weight: 800; margin-bottom: 4px; }
    .plan-pr { font-size: 1.9rem; font-weight: 800; margin: 12px 0 2px; }
    .plan-pr small { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .plan-uzs { font-size: 0.75rem; color: var(--muted); margin-bottom: 16px; }
    .plan ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .plan li { font-size: 0.8rem; color: var(--muted); display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; }
    .plan li i { color: var(--accent); margin-top: 3px; font-size: 0.7rem; flex-shrink: 0; }
    .pay-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 28px; max-width: 560px; margin: 0 auto; }
    .pay-title { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.05rem; margin-bottom: 18px; }
    .card-box { background: linear-gradient(135deg, rgba(79,110,247,0.14), rgba(167,139,250,0.09)); border: 1px solid rgba(79,110,247,0.3); border-radius: 16px; padding: 18px; margin-bottom: 18px; }
    .card-num { font-size: 1.25rem; font-weight: 800; letter-spacing: 0.06em; font-variant-numeric: tabular-nums; }
    .card-own { font-size: 0.78rem; color: var(--muted); margin-top: 5px; }
    .copy-btn { float: right; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 9px; padding: 6px 12px; font-size: 0.72rem; font-weight: 700; cursor: pointer; }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }
    .pay-amount { text-align: center; font-size: 0.9rem; margin-bottom: 18px; color: var(--muted); }
    .pay-amount b { color: var(--gold); font-size: 1.15rem; }
    .up-area { border: 2px dashed var(--border); border-radius: 16px; padding: 26px; text-align: center; cursor: pointer; transition: all .2s; position: relative; margin-bottom: 14px; }
    .up-area:hover, .up-area.has { border-color: var(--accent); background: rgba(79,110,247,0.05); }
    .up-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .up-area img { max-width: 100%; max-height: 180px; border-radius: 10px; margin-top: 10px; display: none; }
    .up-ic { font-size: 1.6rem; color: var(--muted); margin-bottom: 8px; }
    .up-txt { font-size: 0.8rem; color: var(--muted); }
    textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; padding: 13px 15px; color: var(--text); font-size: 0.85rem; outline: none; resize: vertical; min-height: 74px; margin-bottom: 16px; }
    textarea:focus { border-color: var(--accent); }
    .btn-send { width: 100%; padding: 15px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--accent), #6d82f8); color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; box-shadow: 0 8px 28px rgba(79,110,247,0.35); transition: all .2s; }
    .btn-send:hover { transform: translateY(-2px); }
    .btn-send:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .result { margin-top: 14px; font-size: 0.83rem; line-height: 1.6; }
    .toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 400; }
    .toast { display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 11px 18px; font-size: 0.82rem; font-weight: 600; box-shadow: 0 14px 40px rgba(0,0,0,0.5); margin-top: 8px; }
  
    /* ── FONT AWESOME FIX: universal reset ::before shriftini buzmasligi uchun ── */
    .fa, .fas, .far, .fab, .fa-solid, .fa-regular,
    .fa::before, .fas::before, .far::before, .fa-solid::before, .fa-regular::before {
      font-family: "Font Awesome 6 Free" !important;
    }
    .fa-brands, .fab, .fa-brands::before, .fab::before {
      font-family: "Font Awesome 6 Brands" !important;
    }
    .fa-solid, .fas, .fa-solid::before, .fas::before { font-weight: 900; }
  
</style>
</head>

<body>
  <nav>
    <a href="index.html" class="logo">Lingua<span>Verse</span></a>
    <div class="nav-links">
      <a href="index.html"><i class="fa-solid fa-house"></i> Bosh sahifa</a>
      <a href="select-language.html"><i class="fa-solid fa-globe"></i> Tillar</a>
      <a href="languages-html/shop.html"><i class="fa-solid fa-bag-shopping"></i> Do'kon</a>
      <a href="languages-html/profile.html"><i class="fa-solid fa-user"></i> Profil</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="head">
      <h1>Rejani tanlang va <span>faollashtiring</span></h1>
      <p>To'lov chekini yuklang — admin 24 soat ichida tasdiqlab, planingizni yoqadi.</p>
    </div>

    <div class="plans" id="plansGrid"></div>

    <div class="pay-panel" id="payPanel">
      <div class="pay-title"><i class="fa-solid fa-credit-card" style="color:var(--accent2)"></i> To'lov ma'lumotlari</div>
      <div class="card-box">
        <button class="copy-btn" onclick="copyCard()"><i class="fa-solid fa-copy"></i> Nusxa</button>
        <div class="card-num" id="cardNum">8600 1234 5678 9012</div>
        <div class="card-own">Abdullayev Abdulla · UZCARD</div>
      </div>
      <div class="pay-amount">To'lov miqdori: <b id="payAmount">—</b></div>
      <div class="up-area" id="upArea">
        <input type="file" accept="image/*" onchange="onFile(event)">
        <div class="up-ic"><i class="fa-solid fa-cloud-arrow-up"></i></div>
        <div class="up-txt">To'lov cheki rasmini yuklang (JPG/PNG, max 4MB)</div>
        <img id="upPreview" alt="chek">
      </div>
      <textarea id="orderComment" placeholder="Izoh (ixtiyoriy): ism, telefon raqam..."></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendOrder()"><i class="fa-solid fa-paper-plane"></i> Buyurtma yuborish</button>
      <div class="result" id="orderResult"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const FB_CONFIG = {
      apiKey: "AIzaSyArSlWIz3Z9NsUZowCiFj-snKccQfDnm5w",
      authDomain: "linguaverse-ebe09.firebaseapp.com",
      projectId: "linguaverse-ebe09",
      storageBucket: "linguaverse-ebe09.firebasestorage.app",
      messagingSenderId: "130625454868",
      appId: "1:130625454868:web:3f02871f64cb5f8af27801"
    };
    const app = getApps().length ? getApp() : initializeApp(FB_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const PLANS = [
      { id: 'free', name: 'Bepul', ic: 'fa-seedling', col: '#94a3b8', usd: 0, uzs: 0, feats: ['Kuniga 2 ta unit', '1000 token / 5 soat', 'Asosiy leaderboard', 'Coin va XP tizimi'] },
      { id: 'own', name: 'Own', ic: 'fa-gem', col: '#4f6ef7', usd: 9, uzs: 115000, badge: 'Eng mashhur', feats: ['20+ funksiya cheksiz', 'AI bilan cheksiz suhbat', 'Speaking Coach chegirma', 'Reklama yo\'q', 'Priority support'] },
      { id: 'team', name: 'Team', ic: 'fa-users', col: '#a78bfa', usd: 19, uzs: 240000, feats: ['50+ funksiya', 'Jamoa leaderboard', 'Link ulashish', 'Guruh statistikasi', 'Barcha Own imkoniyatlari'] },
      { id: 'universal', name: 'Universal', ic: 'fa-rocket', col: '#f5c842', usd: 39, uzs: 490000, feats: ['100+ funksiya hammasi', 'Daily reward 2x', 'XP Boost x3', 'AI voice suhbat cheksiz', 'Barcha Team imkoniyatlari'] }
    ];

    let selPlan = null, fileB64 = null, CU = null;
    const $ = id => document.getElementById(id);

    function toast(msg, icon = 'fa-circle-info', col = '#4f6ef7') {
      const t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = `<i class="fa-solid ${icon}" style="color:${col}"></i> ${msg}`;
      $('toastWrap').appendChild(t);
      setTimeout(() => t.remove(), 3600);
    }

    function render() {
      $('plansGrid').innerHTML = PLANS.map(p => `
        <div class="plan ${selPlan === p.id ? 'sel' : ''}" onclick="pickPlan('${p.id}')">
          ${p.badge ? `<div class="plan-badge"><i class="fa-solid fa-star"></i> ${p.badge}</div>` : ''}
          <div class="plan-ic" style="background:${p.col}18;color:${p.col}"><i class="fa-solid ${p.ic}"></i></div>
          <div class="plan-nm">${p.name}</div>
          <div class="plan-pr">$${p.usd}<small> / oyiga</small></div>
          <div class="plan-uzs">${p.uzs ? '≈ ' + p.uzs.toLocaleString() + " so'm" : 'Abadiy bepul'}</div>
          <ul>${p.feats.map(f => `<li><i class="fa-solid fa-check"></i><span>${f}</span></li>`).join('')}</ul>
        </div>`).join('');
      const p = PLANS.find(x => x.id === selPlan);
      $('payAmount').textContent = p && p.uzs ? p.uzs.toLocaleString() + " so'm" : '—';
      $('payPanel').style.display = (p && p.uzs) ? 'block' : (selPlan === 'free' ? 'none' : 'block');
    }
    window.pickPlan = function (id) {
      selPlan = id;
      if (id === 'free') { toast('Bepul reja allaqachon faol!', 'fa-check', '#34d399'); render(); return; }
      render();
      $('payPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    window.copyCard = function () {
      navigator.clipboard?.writeText($('cardNum').textContent.replace(/\s/g, ''));
      toast('Karta raqami nusxalandi', 'fa-copy', '#34d399');
    };

    window.onFile = function (e) {
      const f = e.target.files[0]; if (!f) return;
      if (!f.type.startsWith('image/')) { toast('Faqat rasm yuklang!', 'fa-circle-xmark', '#f87171'); return; }
      if (f.size > 4 * 1024 * 1024) { toast('Rasm 4MB dan kichik bo\'lsin', 'fa-circle-xmark', '#f87171'); return; }
      const fr = new FileReader();
      fr.onload = ev => {
        fileB64 = ev.target.result;
        $('upPreview').src = fileB64; $('upPreview').style.display = 'block';
        $('upArea').classList.add('has');
        toast('Chek yuklandi', 'fa-check', '#34d399');
      };
      fr.readAsDataURL(f);
    };

    window.sendOrder = async function () {
      const p = PLANS.find(x => x.id === selPlan);
      if (!p || !p.uzs) { toast('Avval pullik rejani tanlang!', 'fa-hand-pointer', '#f5c842'); return; }
      if (!CU) { window.location.href = 'auth/login.html?redirect=order'; return; }
      if (!fileB64) { toast('To\'lov cheki rasmini yuklang!', 'fa-circle-xmark', '#f87171'); return; }
      const btn = $('sendBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Yuborilmoqda...';
      try {
        const ref = await addDoc(collection(db, 'orders'), {
          itemId: 'plan_' + p.id,
          itemName: p.name + ' Plan',
          itemType: 'plan',
          plan: p.id,
          price_uzs: p.uzs,
          receiptBase64: fileB64,
          comment: $('orderComment').value.trim(),
          uid: CU.uid, userId: CU.uid,
          userEmail: CU.email || '',
          userName: CU.displayName || CU.email?.split('@')[0] || '',
          status: 'pending',
          createdAt: serverTimestamp()
        });
        $('orderResult').innerHTML = `<div style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:12px;color:var(--green)"><i class="fa-solid fa-check-circle"></i> Buyurtma yuborildi! Admin 24 soat ichida tasdiqlaydi.<br><small style="opacity:.7">Order ID: ${ref.id}</small></div>`;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Yuborildi!';
        toast('Buyurtma yuborildi!', 'fa-check', '#34d399');
      } catch (e) {
        $('orderResult').innerHTML = `<div style="color:var(--red)"><i class="fa-solid fa-circle-xmark"></i> Xato: qayta urinib ko'ring.</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Yana urinish';
      }
    };

    // URL ?plan= parametri
    const urlPlan = new URLSearchParams(location.search).get('plan');
    if (urlPlan && PLANS.find(p => p.id === urlPlan)) selPlan = urlPlan;
    render();
    onAuthStateChanged(auth, u => { CU = u; });
  </script>
</body>
</html>
